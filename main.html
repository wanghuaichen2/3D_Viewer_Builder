    </div>

<script>
(function() {
    'use strict';

    const MODEL_DATABASE = [];
    const MAX_FILES = 5;
    const SUPPORTED_FORMATS = ['.ply', '.stl', '.obj'];

    // 获取文件扩展名（小写）
    function getFileExtension(filename) {
        const ext = filename.slice(filename.lastIndexOf('.')).toLowerCase();
        return SUPPORTED_FORMATS.includes(ext) ? ext : null;
    }

    // ---------- 格式解析函数 ----------

    // 解析 PLY 头部获取顶点/面数
    function parsePLYHeader(arrayBuffer) {
        const text = new TextDecoder('utf-8').decode(arrayBuffer);
        const lines = text.split(/\r?\n/);
        let vertices = 0, faces = 0;
        for (let line of lines) {
            line = line.trim().toLowerCase();
            if (line.startsWith('element vertex ')) {
                vertices = parseInt(line.split(/\s+/)[2]) || 0;
            } else if (line.startsWith('element face ')) {
                faces = parseInt(line.split(/\s+/)[2]) || 0;
            } else if (line === 'end_header') {
                break;
            }
        }
        return { vertices, faces };
    }

    // 解析 STL 头部获取顶点/面数
    function parseSTLHeader(arrayBuffer) {
        // 检测是 ASCII 还是二进制
        const header = new Uint8Array(arrayBuffer.slice(0, 80));
        const headerStr = new TextDecoder('utf-8').decode(header).trim();
        // 尝试读取面数（二进制格式）
        const view = new DataView(arrayBuffer);
        let faces = 0;
        let vertices = 0;

        // 如果文件大小 > 84 字节，尝试读取第 80-83 字节作为面数（小端）
        if (arrayBuffer.byteLength >= 84) {
            const faceCount = view.getUint32(80, true); // 小端
            // 验证文件大小是否匹配（84 + faceCount * 50）
            if (arrayBuffer.byteLength === 84 + faceCount * 50) {
                // 二进制 STL
                faces = faceCount;
                vertices = faces * 3;
                return { vertices, faces, format: 'binary' };
            }
        }

        // 否则按 ASCII 处理
        const text = new TextDecoder('utf-8').decode(arrayBuffer);
        const lines = text.split(/\r?\n/);
        let facetCount = 0;
        for (let line of lines) {
            line = line.trim().toLowerCase();
            if (line.startsWith('facet normal')) {
                facetCount++;
            }
        }
        faces = facetCount;
        vertices = faces * 3;
        return { vertices, faces, format: 'ascii' };
    }

    // 解析 OBJ 头部获取顶点/面数
    function parseOBJHeader(arrayBuffer) {
        const text = new TextDecoder('utf-8').decode(arrayBuffer);
        const lines = text.split(/\r?\n/);
        let vertices = 0, faces = 0;
        for (let line of lines) {
            line = line.trim();
            if (line.startsWith('v ')) {
                vertices++;
            } else if (line.startsWith('f ')) {
                faces++;
            }
        }
        return { vertices, faces };
    }

    // 二进制安全 Base64 编码
    function arrayBufferToBase64(arrayBuffer) {
        const bytes = new Uint8Array(arrayBuffer);
        let binary = '';
        const chunkSize = 0x8000;
        for (let i = 0; i < bytes.length; i += chunkSize) {
            const chunk = bytes.subarray(i, i + chunkSize);
            binary += String.fromCharCode.apply(null, chunk);
        }
        return btoa(binary);
    }

    // 处理单个文件
    function processFile(file, index, total) {
        return new Promise((resolve, reject) => {
            const ext = getFileExtension(file.name);
            if (!ext) {
                reject(new Error('不支持的文件格式'));
                return;
            }

            const reader = new FileReader();
            reader.onload = e => {
                try {
                    const arrayBuffer = e.target.result;
                    let vertices = 0, faces = 0;

                    if (ext === '.ply') {
                        const header = parsePLYHeader(arrayBuffer);
                        vertices = header.vertices;
                        faces = header.faces;
                    } else if (ext === '.stl') {
                        try {
                            const header = parseSTLHeader(arrayBuffer);
                            vertices = header.vertices;
                            faces = header.faces;
                        } catch (e) {
                            console.warn('STL 解析失败', e);
                        }
                    } else if (ext === '.obj') {
                        try {
                            const header = parseOBJHeader(arrayBuffer);
                            vertices = header.vertices;
                            faces = header.faces;
                        } catch (e) {
                            console.warn('OBJ 解析失败', e);
                        }
                    }

                    const base64 = arrayBufferToBase64(arrayBuffer);
                    const progress = ((index + 1) / total) * 100;
                    document.getElementById('progressFill').style.width = progress + '%';

                    resolve({
                        name: file.name,
                        format: ext.substring(1),
                        data: base64,
                        vertices: vertices,
                        faces: faces,
                        size: file.size
                    });
                } catch (err) {
                    reject(err);
                }
            };
            reader.onerror = () => reject(new Error('文件读取失败'));
            reader.readAsArrayBuffer(file);
        });
    }

    // 处理选择的文件列表
    async function handleFiles(files) {
        const modelFiles = Array.from(files)
            .filter(f => SUPPORTED_FORMATS.includes(getFileExtension(f.name)))
            .slice(0, MAX_FILES);

        if (modelFiles.length === 0) {
            alert('未找到支持的模型文件（支持 .ply, .stl, .obj）');
            return;
        }
        if (modelFiles.length > MAX_FILES) {
            alert('最多支持 ' + MAX_FILES + ' 个文件，已自动过滤');
        }

        document.getElementById('progressContainer').style.display = 'block';
        document.getElementById('progressFill').style.width = '0%';
        document.getElementById('generateBtn').disabled = true;

        const promises = modelFiles.map((f, i) => processFile(f, i, modelFiles.length));
        const results = await Promise.all(promises.map(p => p.catch(e => { console.error(e); return null; })));
        const validModels = results.filter(m => m !== null);
        MODEL_DATABASE.push(...validModels);
        updateFileList();

        document.getElementById('progressContainer').style.display = 'none';
        document.getElementById('generateBtn').disabled = MODEL_DATABASE.length === 0;
        document.getElementById('statusDot').className = MODEL_DATABASE.length ? 'status-dot ready' : 'status-dot';
        document.getElementById('statusText').textContent = MODEL_DATABASE.length ? '已加载，可生成' : '准备就绪';
    }

    // 更新文件列表显示
    function updateFileList() {
        const list = document.getElementById('fileList');
        list.innerHTML = '';
        MODEL_DATABASE.forEach((m, i) => {
            const div = document.createElement('div');
            div.className = 'file-item';
            const verticesDisplay = m.vertices ? m.vertices.toLocaleString() : 'N/A';
            const facesDisplay = m.faces ? m.faces.toLocaleString() : 'N/A';
            div.innerHTML = `
                <div class="file-item-info">
                    <div class="file-item-name">
                        ${m.name}
                        <span class="format-badge">${m.format.toUpperCase()}</span>
                    </div>
                </div>
                <div class="file-item-stats">
                    <div class="file-item-vertices">顶点: ${verticesDisplay}</div>
                    <div class="file-item-faces">面: ${facesDisplay}</div>
                </div>
                <button class="file-item-remove" onclick="removeFile(${i})">×</button>
            `;
            list.appendChild(div);
        });
    }
    window.removeFile = index => { MODEL_DATABASE.splice(index, 1); updateFileList(); };

    function generateViewHtml() {

    var minDist = 0.01;
    var maxDist = 10000;
    var zoomDamp = 0.12;
    var rotSpeed = 0.006;
    // Velocity-based inertia for smooth deceleration
    var velX = 0;
    var velY = 0;
    var inertiaDecay = 0.92;

    // Pan offset in camera-local space (target stays at model center)
    var panX = 0;
    var panY = 0;
    // Mouse state
    var isRotating = false;
    var isPanning = false;
    var prevX = 0;
    var prevY = 0;
    // Velocity sampling: average last N frames for stable inertia
    var velSamples = [];
    var maxSamples = 4;

    // Compute camera axes from current orientation quaternion
    function getCamRight() {
        return new THREE.Vector3(1, 0, 0).applyQuaternion(orientation);
    }
    function getCamUp() {
        return new THREE.Vector3(0, 1, 0).applyQuaternion(orientation);
    }
    function getCamForward() {
        return new THREE.Vector3(0, 0, 1).applyQuaternion(orientation);
    }

    // Apply rotation delta to the accumulated quaternion
    // dx/dy are in "rotation angle" units, not pixels
    function applyRotation(dx, dy) {
        // Build rotation quaternions around current camera-local axes
        var right = getCamRight();
        var up = getCamUp();
        var qYaw = new THREE.Quaternion().setFromAxisAngle(up, -dx);
        var qPitch = new THREE.Quaternion().setFromAxisAngle(right, -dy);
        // Combine: first yaw then pitch (order matters for natural feel)
        var delta = new THREE.Quaternion().multiplyQuaternions(qPitch, qYaw);
        // Accumulate into orientation
        orientation.premultiply(delta);
        orientation.normalize();
    }

            prevX = e.clientX;
            prevY = e.clientY;
            velX = 0; velY = 0;
            velSamples.length = 0;
        } else if (e.button === 1) {
            isPanning = true;
            prevX = e.clientX;
            prevY = e.clientY;
            e.preventDefault();

            // Record velocity sample
            velSamples.push({ x: dx, y: dy });
            if (velSamples.length > maxSamples) velSamples.shift();
        }
        if (isPanning) {
            var dx = e.clientX - prevX;
            var dy = e.clientY - prevY;
            prevX = e.clientX;
            prevY = e.clientY;
            var panScale = dist * 0.0015;
            panX -= dx * panScale;
            panY += dy * panScale;
        }
    }

    function onMouseUp(e) {
        if (e.button === 2 && isRotating) {
            isRotating = false;
            // Average velocity samples for smooth inertia start
            if (velSamples.length > 0) {
                var sx = 0, sy = 0;
                for (var i = 0; i < velSamples.length; i++) {
                    sx += velSamples[i].x;
                    sy += velSamples[i].y;
                }
                velX = sx / velSamples.length;
                velY = sy / velSamples.length;
            }
            velSamples.length = 0;
        }
        if (e.button === 1) {
            isPanning = false;
        }
    }

    function onWheel(e) {
        e.preventDefault();
        var factor = e.deltaY > 0 ? 1.1 : (1 / 1.1);
        targetDist = Math.max(minDist, Math.min(maxDist, targetDist * factor));
    }

    domEl.addEventListener('mousedown', onMouseDown);
    window.addEventListener('mousemove', onMouseMove);
    window.addEventListener('mouseup', onMouseUp);
    domEl.addEventListener('wheel', onWheel, { passive: false });

    return {
        target: target,
        setMinDist: function(v) { minDist = v; },
        setMaxDist: function(v) { maxDist = v; },
        init: function(d, tgt) {
            dist = d; targetDist = d;
            orientation.identity();
            target.copy(tgt);
            panX = 0; panY = 0;
            velX = 0; velY = 0;
        },
        getState: function() {
            return { q: orientation.clone(), dist: dist, panX: panX, panY: panY };
        },
        resetTo: function(state, tgt) {
            orientation.copy(state.q);
            dist = state.dist;
            targetDist = state.dist;
            target.copy(tgt);
            panX = state.panX || 0;
            panY = state.panY || 0;
            velX = 0; velY = 0;
        },
        update: function() {

            if (!isRotating && (Math.abs(velX) > inertiaMin || Math.abs(velY) > inertiaMin)) {
                applyRotation(velX, velY);

                velY *= inertiaDecay;

                if (Math.abs(velY) < inertiaMin) velY = 0;

            // Smooth zoom interpolation
            dist += (targetDist - dist) * zoomDamp;
            // Compute camera position: orbit around target (model center)
            var forward = getCamForward();
            var right = getCamRight();
            var up = getCamUp();
            // Camera orbits target, then pan offsets both camera and lookAt
            var panOffsetVec = right.clone().multiplyScalar(panX).addScaledVector(up, panY);
            cam.position.copy(target).addScaledVector(forward, dist).add(panOffsetVec);
            cam.up.copy(up);
            cam.lookAt(target.clone().add(panOffsetVec));

    };
})(camera, renderer.domElement);

var sceneBounds = null;

MODEL_DATABASE.forEach(function(model, idx) {

        });

            var sGeo = stlLoader.parse(buf);
            sGeo.computeVertexNormals();
            obj = new THREE.Mesh(sGeo, mat);
        } else if (fmt === 'obj') {
            var txt = new TextDecoder('utf-8').decode(buf);
            obj = objLoader.parse(txt);
            obj.traverse(function(child) {
                if (child.isMesh) child.material = mat.clone();
            });
        }
        if (!obj) return;
        scene.add(obj);
        modelObjects.push({ object: obj });
        loadedCount++;
        // 侧边栏条目

            var eyeClosed = '<svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>';

function fitCamera() {
    var box = new THREE.Box3();
    scene.traverse(function(child) {
        if (child.isMesh) box.expandByObject(child);
    });
    if (!box.isEmpty()) {
        sceneBounds = box;
        var center = box.getCenter(new THREE.Vector3());
        var size = box.getSize(new THREE.Vector3());
        var maxDim = Math.max(size.x, size.y, size.z);
        camera.near = maxDim * 0.001;
        camera.far = maxDim * 200;
        camera.updateProjectionMatrix();
        var initDist = maxDim * 2;
        controls.init(initDist, center);
        controls.setMinDist(maxDim * 0.05);
        controls.setMaxDist(maxDim * 20);
        controls.update();
        window.__initState = controls.getState();
        window.__initTarget = controls.target.clone();
    }
}

document.getElementById('btn-reset').addEventListener('click', function() {
    if (window.__initState) {
        controls.resetTo(window.__initState, window.__initTarget);
    }
});

// 二维截面工具
var sectionEnabled = false;
var drawOverlay = document.getElementById('draw-overlay');
var drawCtx = drawOverlay.getContext('2d');
var sectionCanvas = document.getElementById('section-canvas');
var sectionCtx = null;
var isDrawing = false;
var drawStart = null;
var drawEnd = null;

function initSectionCanvas() {
    var panel = document.getElementById('section-panel');
    sectionCanvas.width = panel.clientWidth;
    sectionCanvas.height = panel.clientHeight - 32;
    sectionCtx = sectionCanvas.getContext('2d');
}

function resizeOverlay() {
    var container = document.getElementById('canvas-container');
    drawOverlay.width = container.clientWidth;
    drawOverlay.height = container.clientHeight;
}

function drawHintText() {
    if (!sectionCtx) return;
    sectionCtx.clearRect(0, 0, sectionCanvas.width, sectionCanvas.height);
    sectionCtx.fillStyle = '#aaa';
    sectionCtx.font = '12px sans-serif';
    sectionCtx.textAlign = 'center';
    sectionCtx.fillText('在3D视图上左键画线', sectionCanvas.width / 2, sectionCanvas.height / 2 - 8);
    sectionCtx.fillText('以生成截面', sectionCanvas.width / 2, sectionCanvas.height / 2 + 12);
}

document.getElementById('btn-section').addEventListener('click', function() {
    sectionEnabled = !sectionEnabled;
    this.classList.toggle('active', sectionEnabled);
    if (sectionEnabled) {
        document.getElementById('section-panel').style.display = 'block';
        initSectionCanvas();
        resizeOverlay();
        drawCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
        drawHintText();
        renderer.domElement.style.cursor = 'crosshair';
    } else {
        document.getElementById('section-panel').style.display = 'none';
        drawCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
        renderer.domElement.style.cursor = '';
    }
});

document.getElementById('section-close').addEventListener('click', function() {
    sectionEnabled = false;
    document.getElementById('btn-section').classList.remove('active');
    document.getElementById('section-panel').style.display = 'none';
    drawCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
    renderer.domElement.style.cursor = '';
});

renderer.domElement.addEventListener('mousedown', function(e) {
    if (e.button !== 0 || !sectionEnabled) return;
    isDrawing = true;
    var rect = renderer.domElement.getBoundingClientRect();
    drawStart = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    drawEnd = null;
    resizeOverlay();
    drawCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
});

renderer.domElement.addEventListener('mousemove', function(e) {
    if (!isDrawing || !sectionEnabled) return;
    var rect = renderer.domElement.getBoundingClientRect();
    drawEnd = { x: e.clientX - rect.left, y: e.clientY - rect.top };
    drawCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
    drawCtx.beginPath();
    drawCtx.moveTo(drawStart.x, drawStart.y);
    drawCtx.lineTo(drawEnd.x, drawEnd.y);
    drawCtx.strokeStyle = 'rgba(126,200,227,0.8)';
    drawCtx.lineWidth = 2;
    drawCtx.setLineDash([6, 4]);
    drawCtx.stroke();
    drawCtx.setLineDash([]);
});

renderer.domElement.addEventListener('mouseup', function(e) {
    if (e.button !== 0 || !isDrawing || !sectionEnabled) return;
    isDrawing = false;
    if (!drawStart || !drawEnd) return;
    var dx = drawEnd.x - drawStart.x;
    var dy = drawEnd.y - drawStart.y;
    if (Math.sqrt(dx * dx + dy * dy) < 10) return;
    computeAndDrawSection();
    drawCtx.clearRect(0, 0, drawOverlay.width, drawOverlay.height);
});

function computeAndDrawSection() {
    var ow = drawOverlay.width;
    var oh = drawOverlay.height;
    var ndcX1 = (drawStart.x / ow) * 2 - 1;
    var ndcY1 = -(drawStart.y / oh) * 2 + 1;
    var ndcX2 = (drawEnd.x / ow) * 2 - 1;
    var ndcY2 = -(drawEnd.y / oh) * 2 + 1;

    var near1 = new THREE.Vector3(ndcX1, ndcY1, -1).unproject(camera);
    var near2 = new THREE.Vector3(ndcX2, ndcY2, -1).unproject(camera);
    var far1 = new THREE.Vector3(ndcX1, ndcY1, 1).unproject(camera);

    var lineDir = new THREE.Vector3().subVectors(near2, near1).normalize();
    var viewDir = new THREE.Vector3().subVectors(far1, near1).normalize();
    var planeNormal = new THREE.Vector3().crossVectors(lineDir, viewDir).normalize();
    if (planeNormal.lengthSq() < 0.0001) return;

    var cuttingPlane = new THREE.Plane().setFromNormalAndCoplanarPoint(planeNormal, near1);

    var segments = [];
    scene.traverse(function(child) {
        if (!child.isMesh || !child.visible) return;
        var geo = child.geometry;
        if (!geo.attributes || !geo.attributes.position) return;
        var posAttr = geo.attributes.position;
        var idx = geo.index;
        var mtx = child.matrixWorld;
        var triCount = idx ? idx.count / 3 : posAttr.count / 3;
        for (var t = 0; t < triCount; t++) {
            var i0, i1, i2;
            if (idx) { i0 = idx.getX(t*3); i1 = idx.getX(t*3+1); i2 = idx.getX(t*3+2); }
            else { i0 = t*3; i1 = t*3+1; i2 = t*3+2; }
            var v0 = new THREE.Vector3(posAttr.getX(i0), posAttr.getY(i0), posAttr.getZ(i0)).applyMatrix4(mtx);
            var v1 = new THREE.Vector3(posAttr.getX(i1), posAttr.getY(i1), posAttr.getZ(i1)).applyMatrix4(mtx);
            var v2 = new THREE.Vector3(posAttr.getX(i2), posAttr.getY(i2), posAttr.getZ(i2)).applyMatrix4(mtx);
            var d0 = cuttingPlane.distanceToPoint(v0);
            var d1 = cuttingPlane.distanceToPoint(v1);
            var d2 = cuttingPlane.distanceToPoint(v2);
            var pts = [];
            if (d0 * d1 < 0) { var r01 = d0 / (d0 - d1); pts.push(new THREE.Vector3().lerpVectors(v0, v1, r01)); }
            if (d1 * d2 < 0) { var r12 = d1 / (d1 - d2); pts.push(new THREE.Vector3().lerpVectors(v1, v2, r12)); }
            if (d2 * d0 < 0) { var r20 = d2 / (d2 - d0); pts.push(new THREE.Vector3().lerpVectors(v2, v0, r20)); }
            if (pts.length >= 2) segments.push([pts[0], pts[1]]);
        }
    });

    if (segments.length === 0) {
        sectionCtx.clearRect(0, 0, sectionCanvas.width, sectionCanvas.height);
        sectionCtx.fillStyle = '#999';
        sectionCtx.font = '12px sans-serif';
        sectionCtx.textAlign = 'center';
        sectionCtx.fillText('未检测到截面', sectionCanvas.width / 2, sectionCanvas.height / 2);
        return;
    }

    var uAxis = new THREE.Vector3().crossVectors(planeNormal, new THREE.Vector3(0, 1, 0));
    if (uAxis.lengthSq() < 0.0001) uAxis = new THREE.Vector3().crossVectors(planeNormal, new THREE.Vector3(1, 0, 0));
    uAxis.normalize();
    var vAxis = new THREE.Vector3().crossVectors(planeNormal, uAxis).normalize();

    var proj = [];
    var minU = Infinity, maxU = -Infinity, minV = Infinity, maxV = -Infinity;
    for (var s = 0; s < segments.length; s++) {
        var seg = segments[s];
        var pu0 = seg[0].dot(uAxis), pv0 = seg[0].dot(vAxis);
        var pu1 = seg[1].dot(uAxis), pv1 = seg[1].dot(vAxis);
        proj.push({ u0: pu0, v0: pv0, u1: pu1, v1: pv1 });
        minU = Math.min(minU, pu0, pu1); maxU = Math.max(maxU, pu0, pu1);
        minV = Math.min(minV, pv0, pv1); maxV = Math.max(maxV, pv0, pv1);
    }

    var cW = sectionCanvas.width;
    var cH = sectionCanvas.height;
    var rangeU = maxU - minU || 1;
    var rangeV = maxV - minV || 1;
    var margin = 20;
    var sc = Math.min((cW - margin * 2) / rangeU, (cH - margin * 2) / rangeV);
    var offU = (cW - rangeU * sc) / 2;
    var offV = (cH - rangeV * sc) / 2;

    sectionCtx.clearRect(0, 0, cW, cH);
    sectionCtx.strokeStyle = '#e74c3c';
    sectionCtx.lineWidth = 1.5;
    sectionCtx.lineCap = 'round';
    for (var s = 0; s < proj.length; s++) {
        var p = proj[s];
        var x0 = (p.u0 - minU) * sc + offU;
        var y0 = cH - ((p.v0 - minV) * sc + offV);
        var x1 = (p.u1 - minU) * sc + offU;
        var y1 = cH - ((p.v1 - minV) * sc + offV);
        sectionCtx.beginPath();
        sectionCtx.moveTo(x0, y0);
        sectionCtx.lineTo(x1, y1);
        sectionCtx.stroke();
    }
}

function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', function() {
    var w = window.innerWidth - SIDEBAR_W;
    var h = window.innerHeight;
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
    renderer.setSize(w, h);
    if (sectionEnabled) resizeOverlay();
});
